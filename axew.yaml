# depends on the following packages
# procps
# tuptime
# lm-sensors

tick_interval: 3

commands:
  - name: kernel
    cmd: (source /etc/os-release; echo "$PRETTY_NAME")
    mode: static

  - name: date
    cmd: date

  - name: vmstat
    cmd: vmstat 1 2 -S M | awk 'NR<=2 || NR==4'

  - name: disk usage
    cmd: df -h /
    mode: static

  - name: sensors
    cmd: >
      sensors | awk '/Package id 0:|Core 0:|Core 1:|Exhaust/ {print}'

  - name: network stats
    cmd: >
      (cat /proc/net/dev; sleep 1; cat /proc/net/dev) | grep "eth0:" | awk 'NR==1{rx1=$2;tx1=$10} NR==2{printf "RX: %.2f MB/s, TX: %.2f MB/s\n", ($2-rx1)/1024/1024, ($10-tx1)/1024/1024}'

  - name: system usage cpu
    cmd: >
      ps -eo comm,%cpu --sort=-%cpu | head -6

  - name: docker
    cmd: docker stats --no-stream

  - name: sys uptime
    cmd: tuptime | grep "System uptime"
    mode: static

  - name: uptime records
    cmd: tuptime --tsince -172800 -t
    mode: static

  - name: restic logs
    cmd: >
      tail -n 4 /home/akina/.logs/restic
    mode: static

  - name: smart logs
    cmd: >
      tail -n 10 /home/akina/.logs/smart
    mode: static
