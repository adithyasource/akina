# depends on the following packages
# procps
# tuptime
# lm-sensors

tick_interval: 3

commands:
  - name: kernel
    cmd: >
      echo "$(grep '^PRETTY_NAME=' /etc/os-release | cut -d= -f2 | tr -d '"') $(uname -m) / Linux $(uname -r)"
    mode: static

  - name: date
    cmd: date

  - name: cpu percent
    cmd: >
      HOME=/home/akina top -b -n2 -d0.5 | grep "%Cpu" | tail -1

  - name: memory percent
    cmd: >
      HOME=/home/akina top -b -n1 | grep "GiB Mem"

  - name: disk usage
    cmd: >
      df -B1 / | awk 'NR==2 {printf "[sys disk] space left: %.2f gb\n", $4/1024/1024/1024; printf "disk usage: %.2f/%.2f gb\n", $3/1024/1024/1024, $2/1024/1024/1024}'
    mode: static

  - name: sensors
    cmd: >
      sensors | awk '/Package id 0:|Core 0:|Core 1:|Exhaust/ {print}'

  - name: network stats
    cmd: >
      (cat /proc/net/dev; sleep 1; cat /proc/net/dev) | grep "eth0:" | awk 'NR==1{rx1=$2;tx1=$10} NR==2{printf "RX: %.2f MB/s, TX: %.2f MB/s\n", ($2-rx1)/1024/1024, ($10-tx1)/1024/1024}'

  - name: system usage cpu
    cmd: >
      ps -eo comm,%cpu | sort -k2 -nr | head -n 5 | awk '{printf "%-20s %.1f%%\n",$1,$2}'

  - name: system usage mem
    cmd: >
      ps -eo comm,rss | sort -k2 -nr | head -n 5 | awk '{printf "%-20s %.1f MB\n",$1,$2/1024}'

  - name: sys uptime
    cmd: tuptime | grep "System uptime"
    mode: static

  - name: uptime records
    cmd: tuptime --tsince -172800 -t
    mode: static

  - name: docker
    cmd: docker stats --no-stream

  - name: restic logs
    cmd: >
      tail -n 10 /home/akina/.logs/restic
    mode: static

  - name: smart logs
    cmd: >
      tail -n 10 /home/akina/.logs/smart
    mode: static
